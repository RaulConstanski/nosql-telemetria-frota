version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_acme
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}

  app:
    build: .
    container_name: app_acme_telemetry
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - mongodb
    stdin_open: true
    tty: true

volumes:
  mongo_data: